services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: bidhub-postgres
    environment:
      POSTGRES_USER: bidhub
      POSTGRES_PASSWORD: bidhub_dev_password
      POSTGRES_DB: bidhub_accounts
    ports:
      - "5432:5432"
    volumes:
      - bidhub_postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidhub -d bidhub_accounts"]
      interval: 5s
      timeout: 3s
      retries: 10

  eureka-server:
    build:
      context: ./backend
      dockerfile: eureka-server/Dockerfile
    container_name: bidhub-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  config-server:
    build:
      context: ./backend
      dockerfile: config-server/Dockerfile
    container_name: bidhub-config
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Core Services ──────────────────────────────────────────────────────────

  account-service:
    build:
      context: ./backend
      dockerfile: account-service/Dockerfile
    container_name: bidhub-account
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/bidhub_accounts
      DB_USERNAME: bidhub
      DB_PASSWORD: bidhub_dev_password
      JWT_SECRET: ${JWT_SECRET:-bidhub-local-dev-secret-key-minimum-32-characters-long}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  catalog-service:
    build:
      context: ./backend
      dockerfile: catalog-service/Dockerfile
    container_name: bidhub-catalog
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy

  auction-service:
    build:
      context: ./backend
      dockerfile: auction-service/Dockerfile
    container_name: bidhub-auction
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/bidhub_auction
      DB_USERNAME: bidhub
      DB_PASSWORD: bidhub_dev_password
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    container_name: bidhub-order
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: bidhub-payment
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: bidhub-notification
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/bidhub_notifications
      DB_USERNAME: bidhub
      DB_PASSWORD: bidhub_dev_password
      DB_DRIVER: org.postgresql.Driver
      JPA_DDL: update
      JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  delivery-service:
    build:
      context: ./backend
      dockerfile: delivery-service/Dockerfile
    container_name: bidhub-delivery
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/bidhub_delivery
      DB_USERNAME: bidhub
      DB_PASSWORD: bidhub_dev_password
      DB_DRIVER: org.postgresql.Driver
      JPA_DDL: update
      JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  admin-service:
    build:
      context: ./backend
      dockerfile: admin-service/Dockerfile
    container_name: bidhub-admin
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/bidhub_admin
      DB_USERNAME: bidhub
      DB_PASSWORD: bidhub_dev_password
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: bidhub-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-bidhub-local-dev-secret-key-minimum-32-characters-long}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bidhub-frontend
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
      PORT: "80"
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  bidhub_postgres_data:
